<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="base(contenido)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
    <link rel="stylesheet" th:href="@{/CSS/estilosModulos.css}">
    <link rel="icon" th:href="@{/resources-media/UTPManager.ico}">
    <title th:text="${pageTitle ?: 'UTPManager'}">UTPManager</title>
</head>

            <span class="visually-hidden">Cargando...</span>

        <h4 class="mt-4 text-white fw-bold">Cargando UTPManager...</h4>
    </div>

                    <a class="btn-nav d-flex justify-content-center align-items-center" data-bs-toggle="offcanvas"
                        href="#menuSidebar" role="button" aria-controls="menuSidebar"><i
                            class="bi bi-list text-white btn-nav-i"></i></a>
                </div>

                <div class="col d-flex justify-content-start  ">
                    <a th:href="@{/inicio}"><img th:src="@{/resources-media/UTPManager.png}" height="32"
                            alt="utpManager-logo"></a>
                </div>

                            </span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow mt-3 rounded-3 border-0">
                            <li>

                            <li><a class="dropdown-item py-2 small" href="#"><i

                                    "A" completada</a></li>
                            <li><a class="dropdown-item py-2 small" href="#"><i
                                        class="bi bi-chat-dots text-primary me-2"></i>Nuevo
                                    comentario en calendario</a></li>

                                <hr class="dropdown-divider">

                            <li><a class="dropdown-item text-center small text-muted" href="#">Ver todas las
                                    notificaciones</a>
                            </li>
                        </ul>
                    </div>

                </div> -->

                <div class="ocultar-res text-white d-flex justify-content-end ">
                    <div class="user-avatar">
                        <i class="bi bi-person-fill text-black"></i>
                    </div>
                    <div class="lh-sm ms-2 me-4">
                        <div class="fw-bold small txt-usuario "><span class="text-white fw-light">Hola,</span>
                            Usuario
                        </div>
                        <div class="txt-codigo">U23306060</div>
                    </div>
                </div>


                <div class="dropdown">

                    <a class="btn-dropdown m-0 ocultar-res" href="#" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-chevron-down fs-5 "></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow mt-3 rounded-3 border-0">
                        <li><a class="dropdown-item py-2  px-3 text-black small " href="#" id="btnCerrarSesion"><i
                                    class="bi bi-box-arrow-right me-2 text-danger "></i>Cerrar Sesión</a>
                        </li>
                    </ul>
                </div>


            </div>

        </nav>
    </header>

    <!--sidebar izquierdo y el contenido dinamico inyectado por Thymeleaf. -->
    <div class="contenedor-main">

        <aside class="menu-lateral">

            <!-- Menu lateral  -->
            <div class="container-sidebar">
                <ul class="nav">

                    <li class="btn-nav-contain w-100">
                        <div class="btn-menu-side">
                            <a class="btn-nav d-flex justify-content-center align-items-center"
                                data-bs-toggle="offcanvas" href="#menuSidebar" role="button"
                                aria-controls="menuSidebar"><i class="bi bi-list btn-nav-i"></i></a>
                        </div>
                    </li>

                    <li class="nav-itemm w-100" th:classappend="${moduloActivo == 'inicio'} ? 'activo'">
                        <a th:href="@{/inicio}" class="nav-link d-flex flex-column align-items-center">
                            <i class="bi bi-house-door-fill fs-5 w-100 h-100 text-white text-center"></i>
                            <span class="mt-1 small txt-menu-lt">Inicio</span>
                        </a>
                    </li>
                    <li class="nav-itemm w-100" th:classappend="${moduloActivo == 'tareas'} ? 'activo'">
                        <a th:href="@{/tareas}" class="nav-link d-flex flex-column align-items-center">
                            <i class="bi bi-list-task fs-5 w-100 h-100 text-white text-center"></i>
                            <span class="mt-1 small txt-menu-lt">Tareas</span>
                        </a>
                    </li>
                    <li class="nav-itemm w-100" th:classappend="${moduloActivo == 'proyectos'} ? 'activo'">
                        <a th:href="@{/proyectos}" class="nav-link d-flex flex-column align-items-center">
                            <i class="bi bi-folder-fill fs-5 w-100 h-100 text-white text-center"></i>
                            <span class="mt-1 small txt-menu-lt">Proyectos</span>
                        </a>
                    </li>
                    <li class="nav-itemm w-100" th:classappend="${moduloActivo == 'calendario'} ? 'activo'">
                        <a th:href="@{/calendario}" class="nav-link d-flex flex-column align-items-center">
                            <i class="bi bi-calendar-week fs-5 w-100 h-100 text-white text-center"></i>
                            <span class="mt-1 small txt-menu-lt">Calendario</span>
                        </a>
                    </li>

                </ul>
            </div>

        </aside>

        <main class="contenido-dinamico">
            <div th:replace="${contenido}">

            </div>
        </main>

    </div>

    <!-- Menu lateral  para pantallas pequenas. -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="menuSidebar" aria-labelledby="menuSidebarLabel">
        <div class="offcanvas-header sidebar-head">
            <button type="button" data-bs-dismiss="offcanvas" aria-label="Cerrar" class="btn-cerrar-sidebar icono-menu">
                <i class="bi bi-arrow-left text-white fs-4"></i></button>
        </div>
        <div class="offcanvas-body p-0">
            <ul class="nav">
                <li class="nav-itemm w-100 btn-sidebar" th:classappend="${moduloActivo == 'inicio'} ? 'activo'">
                    <a class="nav-link d-flex align-items-center gap-3" th:href="@{/inicio}">
                        <i class="bi bi-house-door-fill fs-4 text-white text-center"></i>
                        <span class="mt-1 text-white">Inicio</span>
                    </a>
                </li>
                <li class="nav-itemm w-100 btn-sidebar" th:classappend="${moduloActivo == 'tareas'} ? 'activo'">
                    <a class="nav-link d-flex align-items-center gap-3" th:href="@{/tareas}">
                        <i class="bi bi-list-task fs-4 text-white text-center"></i>
                        <span class="mt-1 text-white">Tareas</span>
                    </a>
                </li>
                <li class="nav-itemm w-100 btn-sidebar" th:classappend="${moduloActivo == 'proyectos'} ? 'activo'">
                    <a class="nav-link d-flex align-items-center gap-3" th:href="@{/proyectos}">
                        <i class="bi bi-folder-fill fs-4 text-white text-center"></i>
                        <span class="mt-1 text-white">Proyectos</span>
                    </a>
                </li>
                <li class="nav-itemm w-100 btn-sidebar" th:classappend="${moduloActivo == 'calendario'} ? 'activo'">
                    <a class="nav-link d-flex align-items-center gap-3" th:href="@{/calendario}">
                        <i class="bi bi-calendar-week fs-4 text-white text-center"></i>
                        <span class="mt-1 text-white">Calendario</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div th:replace="~{fragments/actividad-modal :: modalActividad}"></div>
    <div th:replace="~{fragments/actividad-modal :: modalExito}"></div>
    <div th:replace="~{fragments/actividad-modal :: modalReactivar}"></div>
    <div th:replace="~{fragments/actividad-modal :: modalConfirmacionAccion}"></div>
    <div th:replace="~{fragments/actividad-modal :: modalCrearProyecto}"></div>
    <div th:replace="~{fragments/actividad-modal :: modalCambiarEstado}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/JS/app.js}"></script>
    <script th:src="@{/JS/inicio.js}"></script>
    <script th:src="@{/JS/moduloTareas.js}"></script>
    <script th:src="@{/JS/moduloProyectos.js}"></script>
    <script th:src="@{/JS/moduloCalendario.js}"></script>

</body>

</html>
