<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: base(~{::contenido})}">

<head>
    <title>UTPManager | Proyectos</title>
</head>

<body>
    <div th:fragment="contenido">

        <div
            class="projects-header projects-hero d-flex justify-content-between align-items-start mb-4 gap-3 flex-wrap">
            <div id="seccion-titulo-proyectos">
                <h2 class="fw-bold h3 mb-0">Mis Proyectos</h2>
                <p class="text-muted small mb-0">
                    <span th:text="${totalProyectos}">0</span> proyectos activos
                </p>
            </div>

            <div class="d-flex gap-2">
                <button sec:authorize="hasRole('ADMIN')" class="btn btn-primary rounded-pill px-4 shadow-sm" id="botonAccionProyecto" type="button"
                    onclick="abrirModalProyecto()">
                    <i class="bi bi-plus-lg"></i> Nuevo Proyecto
                </button>
            </div>
        </div>

        <div class="row g-4" id="galeria-proyectos" th:if="${!#lists.isEmpty(proyectos)}">
            <div class="col-12 col-md-6 col-lg-4" th:each="proyecto : ${proyectos}">
                <article class="tarjeta-proyecto proyecto-card text-dark" role="link" tabindex="0"
                    th:data-url="@{/proyectos/{id}(id=${proyecto.idProyecto})}"
                    onclick="window.location.href = this.dataset.url">
                    <div class=" proyecto-card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3 gap-3">
                            <div class="d-flex align-items-center gap-3 flex-grow-1">
                                <div class="icon-box-proyecto proyecto-icon-box rounded-3 d-flex align-items-center justify-content-center"
                                    th:style="|--project-color: ${proyecto.colorIcono ?: '#0d6efd'};|">
                                    <i class="bi bi-folder2-open fs-4"></i>
                                </div>
                                <h5 class="fw-bold mb-0 text-truncate" th:text="${proyecto.nombre}">Proyecto</h5>
                            </div>

                            <div sec:authorize="hasRole('ADMIN')" class="dropdown" onclick="event.stopPropagation()">
                                <button class="btn btn-light btn-sm rounded-circle boton-opciones-proyecto"
                                    type="button" data-bs-toggle="dropdown" aria-expanded="false"
                                    aria-label="Opciones del proyecto">
                                    <i class="bi bi-three-dots"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                    <li>
                                        
                                        <a class="dropdown-item text-danger" href=""
                                            th:attr="data-id=${proyecto.idProyecto},data-nombre=${proyecto.nombre}"
                                            onclick="event.stopPropagation(); solicitarEliminarProyecto(this.dataset.id, this.dataset.nombre); return false;">
                                            <i class="bi bi-trash3 me-2"></i>Eliminar proyecto
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <p class="text-muted small mb-3 proyecto-desc" th:text="${proyecto.descripcion}">
                            Descripcion</p>

                        <div class="mt-auto d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <span class="badge rounded-pill bg-light text-dark border px-3 py-2">
                                <i class="bi bi-list-task me-1"></i><span
                                    th:text="${tareasCompletadasPorProyecto[proyecto.idProyecto] ?: 0}">0</span>/<span
                                    th:text="${totalTareasPorProyecto[proyecto.idProyecto] ?: 0}">0</span> Tareas
                            </span>
                            <span class="text-danger small fw-semibold">
                                <i class="bi bi-calendar3 me-1"></i><span th:text="${proyecto.fechaLimite}">--</span>
                            </span>
                        </div>
                    </div>
                </article>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(proyectos)}" class="proyectos-empty-state">
            <div class="fw-semibold mb-1">No hay proyectos disponibles</div>
            <div class="small text-muted">Crea un proyecto nuevo para empezar a organizar tu trabajo.</div>
        </div>

        <script>
            var moduloActivo = 'proyectos';
        </script>

    </div>
</body>

</html>
