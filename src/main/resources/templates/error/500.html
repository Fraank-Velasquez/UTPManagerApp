<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTPManager | Error interno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

    <div class="text-center p-5">
        <div class="rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
             style="width:100px; height:100px; background: linear-gradient(135deg,#7c3aed,#4c1d95);">
            <i class="bi bi-exclamation-triangle-fill text-white" style="font-size:2.8rem;"></i>
        </div>
        <h1 class="fw-bold mb-1" style="font-size:4.5rem; color:#7c3aed;">500</h1>
        <h4 class="fw-bold text-dark mb-2">Error interno del servidor</h4>
        <p class="text-muted mb-4">Ocurrió un error inesperado. Intenta de nuevo en unos momentos.</p>

        <div th:if="${errorMessage}"
             class="alert alert-danger text-start rounded-3 mb-4 mx-auto"
             style="max-width:500px; font-family:monospace; font-size:.85rem;">
            <i class="bi bi-bug-fill me-2"></i>
            <span th:text="${errorMessage}">Detalle del error</span>
        </div>

        <a th:href="@{/inicio}" class="btn btn-primary btn-lg rounded-pill px-4 me-2">
            <i class="bi bi-house-door-fill me-2"></i>Ir al Inicio
        </a>
        <a href="javascript:location.reload()" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
            <i class="bi bi-arrow-clockwise me-2"></i>Reintentar
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
