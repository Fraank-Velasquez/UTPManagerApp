<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTPManager | Acceso denegado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

    <div class="text-center p-5">
        <div class="rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
             style="width:100px; height:100px; background: linear-gradient(135deg,#dc2626,#991b1b);">
            <i class="bi bi-shield-x-fill text-white" style="font-size:3rem;"></i>
        </div>
        <h1 class="fw-bold mb-1" style="font-size:4.5rem; color:#dc2626;">403</h1>
        <h4 class="fw-bold text-dark mb-2">Acceso Denegado</h4>
        <p class="text-muted mb-4" style="max-width:400px; margin:auto;">
            No tienes permiso para acceder a esta sección.<br>
            Tu rol no tiene los permisos necesarios.
        </p>
        <a th:href="@{/inicio}" class="btn btn-primary btn-lg rounded-pill px-4 me-2">
            <i class="bi bi-house-door-fill me-2"></i>Ir al Inicio
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
            <i class="bi bi-arrow-left me-2"></i>Volver
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
